loader:
  _target_: topobench.data.loaders.YelpDatasetLoader
  parameters:
    data_domain: graph
    data_type: Yelp_on_disk
    data_name: Yelp_256_32
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}
    memory_type: on_disk_cluster
    cluster:
      num_parts: 256
      recursive: false
      keep_inter_cluster_edges: false
      sparse_format: csr
    stream:
      q: 32
      num_workers: 0
      pin_memory: false
      with_edge_attr: false
      precompute_split_parts: true
    dtype_policy: float32

parameters:
  num_features: 300
  num_classes: 100
  num_nodes: 716847
  task: multilabel classification
  loss_type: BCE
  monitor_metric: accuracy
  task_level: node

split_params:
  learning_setting: transductive
  data_split_dir: ${paths.data_dir}/data_splits/${dataset.loader.parameters.data_name}
  data_seed: 0
  split_type: random
  k: 10
  train_prop: 0.7
  standardize: false

dataloader_params:
  batch_size: 1
  num_workers: 0
  pin_memory: false