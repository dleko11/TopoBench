# Dataset loader config
loader:
  _target_: topobench.data.loaders.graph.FakeDatasetLoader
  parameters:
    # Framework-specific data organization ---
    data_domain: graph
    data_type: FakeDataset_cluster
    data_name: FakeDataset_cluster
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}
    memory_type: on_disk_cluster

    # FakeOnDiskDataset specific generation parameters
    num_graphs: 1              # Total number of graphs to generate
    avg_num_nodes: 500000           # Average nodes per graph
    avg_degree: 10.0              # Average connections per node
    edge_dim: 0                  # Dimension of edge features (0 for none)
    is_undirected: True          # Whether to make graphs undirected

    # Parameters linked from the main 'parameters' section below
    num_channels: ${dataset.parameters.num_features} # Use num_features for node feature dim
    num_classes: ${dataset.parameters.num_classes}   # Use num_classes for generation
    task: ${dataset.parameters.task_level}           # Use task_level ('graph' or 'node')
    
    # NEW: global partition settings (Option B)
    cluster:
      num_parts: 1000                       # number of clusters for single global partition
      recursive: false                    # forwarded to PyG ClusterData
      keep_inter_cluster_edges: false     # standard Cluster-GCN style
      sparse_format: csr                  # required by our block-stream loader

    # NEW: streaming / loader settings for block-wise training
    stream:
      q: 2                                # clusters per batch (Cluster-GCN "bsize")
      num_workers: 0                      # increase if needed
      pin_memory: false                   # true if you want faster H2D
      with_edge_attr: false               # WebKB has no edge_attr
      precompute_split_parts: true        # write parts_with_{train,val,test}.npy

    # NEW: how to store features on disk
    dtype_policy: float32                 # current ClusterOnDisk uses float32

# Dataset parameters
parameters:
  num_features: 1500      # Node feature dimension for the generated data
  num_classes: 2        # Number of classes for the generated labels
  task: classification
  loss_type: cross_entropy
  monitor_metric: accuracy
  task_level: node

# Splits
split_params:
  learning_setting: transductive # inductive
  data_split_dir: ${paths.data_dir}/data_splits/${dataset.loader.parameters.data_name}
  data_seed: 0
  split_type: random
  k: 10
  train_prop: 0.8
  valid_prop: 0.1
  test_prop: 0.1


# Dataloader parameters
dataloader_params:
  batch_size: 1 # # 32 Adjusted for potentially larger graph data
  num_workers: 0
  pin_memory: False
  
# NEW: evaluation behavior for block-stream mode
eval:
  cover_strategy: parts_with_split        # or "all_parts"
