# Dataset loader config
loader:
  _target_: topobench.data.loaders.CoauthorDatasetLoader
  parameters:
    data_domain: graph
    data_type: CoauthorCS_on_disk
    data_name: CS
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}

    # choose memory mode
    memory_type: on_disk_cluster          # "in_memory", "on_disk", or "on_disk_cluster"

    # global partition settings (single global partition)
    cluster:
      num_parts: 2048
      recursive: false
      keep_inter_cluster_edges: false
      sparse_format: csr

    # streaming / loader settings for block-wise training
    stream:
      q: 8
      num_workers: 0
      pin_memory: false
      with_edge_attr: false               # Coauthor has no edge_attr by default
      precompute_split_parts: true

    # how to store features on disk
    dtype_policy: float32

# Dataset parameters
parameters:
  num_features: 6805
  num_classes: 15
  num_nodes: 18333
  task: classification
  loss_type: cross_entropy
  monitor_metric: accuracy
  task_level: node

# splits
split_params:
  learning_setting: transductive
  data_split_dir: ${paths.data_dir}/data_splits/${dataset.loader.parameters.data_name}
  data_seed: 0
  split_type: random  # either "k-fold" or "random"
  k: 10               # for "k-fold" Cross-Validation
  train_prop: 0.5     # for "random" strategy splitting
  standardize: False

# Dataloader parameters
dataloader_params:
  batch_size: 1 # Fixed
  num_workers: 0
  pin_memory: False