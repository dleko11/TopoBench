# Dataset loader config
loader:
  _target_: topobench.data.loaders.CoraFullDatasetLoader
  parameters: 
    data_domain: graph
    data_type: cocitation
    data_name: CoraFull
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}

# Dataset parameters (unchanged)
parameters:
  num_features: 8710
  num_classes: 70
  num_nodes: 19793
  task: classification
  loss_type: cross_entropy
  monitor_metric: accuracy
  task_level: node

# Splits (unchanged; used by pack_global_partition)
split_params:
  learning_setting: transductive # transductive # inductive
  data_split_dir: ${paths.data_dir}/data_splits/${dataset.loader.parameters.data_name}
  data_seed: 0
  split_type: random
  k: 10
  train_prop: 0.7

# Dataloader parameters for legacy paths (kept; ignored in on_disk_cluster mode)
dataloader_params:
  batch_size: 1
  drop_last: True  
  num_workers: 0
  pin_memory: False
